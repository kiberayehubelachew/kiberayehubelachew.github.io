<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Kiberayehu Belachew</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">KB.</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <h2 class="card-title">📩 Get In Touch</h2>
      <p style="margin-bottom: 2rem; color: #4a627a;">Have a question or want to work together? Fill out the form below or reach out via my social links on the home page.</p>
      
      <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 600;">Full Name</label>
          <input type="text" placeholder="Your Name" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;">
        </div>
        
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 600;">Email Address</label>
          <input type="email" placeholder="email@example.com" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;">
        </div>

        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 600;">Message</label>
          <textarea rows="5" placeholder="How can I help you?" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="social-btn" style="border: none; cursor: pointer; padding: 1rem; font-size: 1rem;">Send Message</button>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
